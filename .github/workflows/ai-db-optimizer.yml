name: AI Database Optimizer CI/CD

on:
  pull_request:
    branches:
      - main
      - master
    paths:
      - '**.ts'
      - '**.js'
      - '**.prisma'
      - '**.py'
      - '**.sql'

  workflow_dispatch:
    inputs:
      slow_query:
        description: 'Optional: paste a raw slow SQL query to analyze'
        required: false
        type: string

permissions:
  pull-requests: write
  contents: write
  issues: write

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  test-agent:
    name: Test LangGraph Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install agent dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-agent.txt

      - name: Run agent test suite (golden dataset)
        run: |
          python -m pytest tests/test_agent.py -v
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

  scan-for-antipatterns:
    name: Scan for N+1 Query Patterns
    runs-on: ubuntu-latest

    outputs:
      has_antipatterns: ${{ steps.scan.outputs.found }}
      scan_report: ${{ steps.scan.outputs.report }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for N+1 patterns in TypeScript/JavaScript
        id: scan
        run: |
          echo "Scanning for N+1 query anti-patterns..."

          REPORT=""
          FOUND="false"

          if grep -rnE 'for\s*\(.*\)\s*\{' --include="*.ts" --include="*.js" -l . 2>/dev/null | \
             xargs -I{} grep -l 'findUnique\|findFirst' {} 2>/dev/null; then
            REPORT="$REPORT\n- [CRITICAL] Found for-loop + findUnique/findFirst pattern (N+1 risk)"
            FOUND="true"
          fi

          FIND_MANY_FILES=$(grep -rnl 'findMany' --include="*.ts" --include="*.js" . 2>/dev/null || true)
          for f in $FIND_MANY_FILES; do
            if ! grep -q 'include:' "$f" 2>/dev/null; then
              REPORT="$REPORT\n- [WARNING] $f uses findMany without include (potential N+1 if relations are accessed later)"
              FOUND="true"
            fi
          done

          if grep -rnE 'prisma\.\$queryRaw' --include="*.ts" --include="*.js" . 2>/dev/null | \
             grep -v 'JOIN' 2>/dev/null; then
            REPORT="$REPORT\n- [INFO] Raw SQL query found without JOIN — may be intentional"
          fi

          echo "found=$FOUND" >> "$GITHUB_OUTPUT"
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REPORT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          if [ "$FOUND" = "true" ]; then
            echo "::warning::N+1 query anti-patterns detected in codebase"
          else
            echo "No anti-patterns detected."
          fi

  run-ai-pipeline:
    name: AI Diagnostician Pipeline (Legacy)
    runs-on: ubuntu-latest
    needs: scan-for-antipatterns
    if: always()

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -U google-genai pydantic psycopg2-binary tabulate colorama requests

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: npx prisma generate

      - name: Enable pg_stat_statements and hypopg
        run: |
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d testdb -c "
            CREATE EXTENSION IF NOT EXISTS pg_stat_statements;
          " || echo "pg_stat_statements not available in this image"
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d testdb -c "
            CREATE EXTENSION IF NOT EXISTS hypopg;
          " || echo "hypopg not available — Phase 2 will use simulation mode"

      - name: Apply database schema
        run: npx prisma db push --accept-data-loss
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/testdb

      - name: Apply agent_memory schema (pgvector)
        run: |
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d testdb -c "
            CREATE EXTENSION IF NOT EXISTS vector;
            CREATE SCHEMA IF NOT EXISTS agent_memory;
            CREATE TABLE IF NOT EXISTS agent_memory.optimization_history (
                id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
                tenant_id VARCHAR(64) NOT NULL,
                query_text TEXT NOT NULL,
                query_embedding vector(768) NOT NULL,
                diagnosis_json JSONB NOT NULL,
                proposed_fix TEXT,
                risk_level INT,
                baseline_cost FLOAT,
                validated_cost FLOAT,
                human_feedback VARCHAR(32),
                created_at TIMESTAMPTZ DEFAULT NOW()
            );
          "

      - name: Seed test data
        run: |
          PGPASSWORD=postgres psql -U postgres -h localhost -p 5432 -d testdb -c "
            INSERT INTO \"Customer\" (email, full_name)
            SELECT 'user' || g || '@test.com', 'Test User ' || g
            FROM generate_series(1, 100) g;
            INSERT INTO \"Order\" (\"customerId\", status, \"createdAt\")
            SELECT (g % 100) + 1,
              CASE WHEN g % 3 = 0 THEN 'pending' ELSE 'shipped' END,
              NOW() - (g || ' hours')::interval
            FROM generate_series(1, 500) g;
          "

      - name: Run Agent Test Suite
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PG_HOST: localhost
          PG_PORT: 5432
          PG_DBNAME: testdb
          PG_USER: postgres
          PG_PASSWORD: postgres
        run: |
          python -m pytest tests/test_agent.py -v --tb=short

      - name: Run Phase 1 — AI Diagnostician (Legacy)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        continue-on-error: true
        run: |
          if [ ! -f optimization_artifacts/slow_query_input.json ]; then
            cat > optimization_artifacts/slow_query_input.json << 'PAYLOAD'
          {
            "raw_query": "SELECT * FROM orders WHERE status = 'pending'; [+N individual SELECT * FROM customers WHERE customer_id = ?]",
            "query_count": 501,
            "model": "Order",
            "operation": "findMany + loop(findUnique)",
            "duration_ms": 1250,
            "baseline_explain": "Individual queries use PK Index Scan (~1ms each). Total latency is due to 500 sequential network round-trips.",
            "intercepted_code": "const orders = await prisma.order.findMany({ where: { status: 'pending' } }); for (const order of orders) { order.customer = await prisma.customer.findUnique({ where: { customerId: order.customerId } }); }"
          }
          PAYLOAD
          fi
          python optimization_artifacts/run_phase_1.py || echo "Phase 1 failed (non-blocking)" >> $GITHUB_STEP_SUMMARY

      - name: Run Phase 2 — HypoPG Evaluator (Legacy)
        continue-on-error: true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/testdb
        run: python optimization_artifacts/run_phase_2.py || echo "Phase 2 failed (non-blocking)" >> $GITHUB_STEP_SUMMARY

      - name: Run Phase 3 — ORM Translator (Legacy)
        continue-on-error: true
        run: python optimization_artifacts/run_phase_3.py || echo "Phase 3 failed (non-blocking)" >> $GITHUB_STEP_SUMMARY

      - name: Upload optimization artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-optimization-report
          path: optimization_artifacts/
          retention-days: 30

      - name: Post AI Optimization Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const scanReport = `${{ needs.scan-for-antipatterns.outputs.scan_report }}`;

            let phase1Summary = 'Phase 1 output not available.';
            const p1Path = path.join(process.env.GITHUB_WORKSPACE, 'optimization_artifacts', 'phase_1_output.json');
            if (fs.existsSync(p1Path)) {
              try {
                const p1 = JSON.parse(fs.readFileSync(p1Path, 'utf8'));
                const diag = p1.diagnosis || {};
                const winner = p1.winning_hypothesis || {};
                phase1Summary = [
                  `| Metric | Value |`,
                  `|---|---|`,
                  `| Root Cause | \`${diag.root_cause_category || 'N/A'}\` |`,
                  `| Is DB Index Problem | ${diag.is_database_index_problem ? 'Yes' : 'No'} |`,
                  `| Fix Layer | \`${diag.required_fix_layer || 'N/A'}\` |`,
                  `| Winning Fix | ${winner.label || 'N/A'} |`,
                  `| Projected Latency | ${winner.projected_latency_ms || '?'}ms |`,
                  `| Latency Reduction | ${winner.latency_reduction_pct || '?'}% |`,
                ].join('\n');
              } catch (e) {
                phase1Summary = 'Failed to parse phase_1_output.json';
              }
            }

            let instructions = '';
            const instrPath = path.join(process.env.GITHUB_WORKSPACE, 'optimization_artifacts', 'PRISMA_INSTRUCTIONS.md');
            if (fs.existsSync(instrPath)) {
              instructions = fs.readFileSync(instrPath, 'utf8').trim();
            }

            const prAuthor = context.payload.pull_request.user.login;
            const body = [
              `## AI Database Optimization Report`,
              ``,
              `@${prAuthor}, the AI Database Optimizer has analyzed this PR.`,
              ``,
              `### Agent Test Results`,
              `The new LangGraph agent test suite was executed. See workflow output for details.`,
              ``,
              `### Static Analysis (Anti-Pattern Scan)`,
              scanReport || 'No anti-patterns detected.',
              ``,
              `### AI Diagnosis (Phase 1 — Gemini)`,
              phase1Summary,
              ``,
              instructions ? `### Fix Instructions\n\n<details>\n<summary>Click to expand full instructions</summary>\n\n${instructions}\n\n</details>` : '',
              ``,
              `---`,
              `*Generated by AI Database Optimizer pipeline*`,
            ].filter(Boolean).join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });

      - name: Write Job Summary
        if: always()
        run: |
          echo "## AI Database Optimizer — Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Agent Test Suite" >> $GITHUB_STEP_SUMMARY
          echo "LangGraph agent test run completed. Check pytest output above." >> $GITHUB_STEP_SUMMARY
