name: AI Database Optimizer CI/CD Interceptor

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  pull-requests: write
  contents: read

jobs:
  optimize-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install psycopg2-binary tabulate colorama

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node.js dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Test Suite
        run: npm run test
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Post Optimization Recommendations to PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            const filePath = path.join(process.env.GITHUB_WORKSPACE, 'optimization_artifacts', 'PRISMA_INSTRUCTIONS.md');
            
            if (fs.existsSync(filePath)) {
              const fileContent = fs.readFileSync(filePath, 'utf8').trim();
              
              if (fileContent.length > 0) {
                const prAuthor = context.payload.pull_request.user.login;
                const commentBody = `### ⚡ AI Database Optimization Report\n\n@${prAuthor}, a slow query was detected and analyzed during the test run. Here are the optimized migration steps:\n\n${fileContent}`;
                
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: commentBody
                });
                
                console.log('Successfully posted optimization recommendations comment to PR.');
              } else {
                console.log('PRISMA_INSTRUCTIONS.md exists but is empty. Skipping PR comment.');
              }
            } else {
              console.log('No database optimization recommendations found (PRISMA_INSTRUCTIONS.md does not exist).');
            }
